<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="css/style.css">
    <title>Your Cart | Grand Hotel</title>
</head>
<body>

<header class="page-title" data-i18n="navCart">
    Cart
</header>

<main class="cart-container">
    <div id="cart-content"></div>

    <div class="cart-tip-container" id="cart-tip-container" style="display: none;">
        <span data-i18n="lblTip">Add Tip:</span>
        <select id="tip-select">
            <option value="0">0%</option>
            <option value="0.1">10%</option>
            <option value="0.15">15%</option>
        </select>
    </div>
    
    <div class="cart-total" id="cart-total-container" style="display: none;">
        <span data-i18n="lblTotal">Total:</span>
        <span id="cart-total-price">0€</span>
    </div>

    <button class="checkout-btn" id="checkout-btn" data-i18n="btnCheckout" style="display: none;">Proceed to Checkout</button>
</main>

<nav class="bottom-nav">
    <a href="main.html">
        <span class="nav-icon">✨</span>
        <span data-i18n="navStart">Start</span>
    </a>
    <a href="menu.html">
        <span class="nav-icon">🍽️</span>
        <span data-i18n="navMenu">Menu</span>
    </a>
    <a href="cart.html" class="current" id="cart-nav-link">
        <span class="nav-icon">🛒</span>
        <span id="cart-badge" data-i18n="navCart">Cart</span>
    </a>
</nav>

<button class="call-service-btn">🛎️</button>

<div id="toast" class="toast"></div>

<script src="js/model.js"></script>
<script src="js/view.js"></script>
<script src="js/controller.js"></script>
</body>
</html>
